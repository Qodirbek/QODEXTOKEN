<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qodex Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="navbar">
        <button onclick="showPage('home')">Home</button>
        <button onclick="showPage('earn')">Earn</button>
        <button onclick="showPage('upgrade')">Upgrade</button>
        <button onclick="showPage('ranking')">Ranking</button>
        <button onclick="showProfileModal()">Profile</button>
    </div>

    <div id="home" class="page">
        <h1>Click the egg to earn coins</h1>
        <button onclick="clickEgg()">Click Egg</button>
        <p id="coins">Coins: 0</p>
        <p id="energy">Energy: 1000</p>
    </div>

    <div id="earn" class="page hidden">
        <h1>Your Referral Link</h1>
        <p>Your unique referral link: <span id="referral-link"></span></p>
    </div>

    <div id="upgrade" class="page hidden">
        <h1>Upgrade</h1>
        <button onclick="upgradeClick()">Upgrade Click (3500 coins)</button>
        <button onclick="upgradeEnergy()">Upgrade Energy (3500 coins)</button>
    </div>

    <div id="ranking" class="page hidden">
        <h1>Top 10 Rankings</h1>
        <ul id="ranking-list">
            <!-- List of top users will be here -->
        </ul>
    </div>

    <div id="username-modal" class="hidden">
        <h2>Enter your name</h2>
        <input type="text" id="username-input" placeholder="Enter your name">
        <button onclick="saveUsername()">Save</button>
        <button onclick="closeProfileModal()">Close</button>
    </div>

    <div id="profile-modal" class="hidden">
        <h2>Your Profile</h2>
        <p id="user-id"></p>
        <button onclick="showProfileModal()">Change Name</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
