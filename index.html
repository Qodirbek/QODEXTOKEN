<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O'yin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Yuqori qism -->
    <header>
        <div id="user-info">
            <img id="user-avatar" src="https://via.placeholder.com/50" alt="Avatar">
            <span id="user-name">Username</span>
        </div>
        <div class="stats">
            <div class="stat">
                <img src="https://raw.githubusercontent.com/Qodirbek/QODEXTOKEN/main/Coin.png" alt="Tanga">
                <span id="coins">0</span>
            </div>
            <div class="stat">
                <div class="energy-bar">
                    <div id="energy-fill"></div>
                </div>
            </div>
        </div>
    </header>

    <!-- Asosiy qism -->
    <main id="home" class="page">
        <div id="egg-container">
            <img id="egg" src="https://raw.githubusercontent.com/Qodirbek/QODEXTOKEN/main/egg.png" alt="Tuxum" onclick="clickEgg()">
        </div>
        <p id="message">Tuxumni bosib tanga ishlang!</p>
    </main>

    <!-- Navigatsiya -->
    <footer>
        <button onclick="navigateTo('home')">
            <img src="https://raw.githubusercontent.com/Qodirbek/QODEXTOKEN/main/home.png" alt="Home"> Home
        </button>
        <button onclick="navigateTo('earn')">
            <img src="https://raw.githubusercontent.com/Qodirbek/QODEXTOKEN/main/earn.png" alt="Earn"> Earn
        </button>
        <button onclick="navigateTo('upgrade')">
            <img src="https://raw.githubusercontent.com/Qodirbek/QODEXTOKEN/main/upgrade.png" alt="Upgrade"> Upgrade
        </button>
        <button onclick="navigateTo('rating')">
            <img src="https://raw.githubusercontent.com/Qodirbek/QODEXTOKEN/main/rating.png" alt="Reyting"> Reyting
        </button>
    </footer>

    <script src="script.js"></script>
</body>
</html>
