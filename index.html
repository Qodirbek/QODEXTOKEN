<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notcoin Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Yuqori qism: Telegram foydalanuvchi ma'lumotlari -->
    <header>
        <div id="user-info" onclick="navigateTo('rating')">
            <img id="user-avatar" src="https://raw.githubusercontent.com/Qodirbek/QODEXTOKEN/main/avatar.png" alt="Avatar">
            <span id="user-name">Foydalanuvchi</span>
        </div>
    </header>

    <!-- Asosiy sahifa: Home -->
    <main id="home">
        <div id="egg-container">
            <img id="egg" src="https://raw.githubusercontent.com/Qodirbek/QODEXTOKEN/main/egg.png" alt="Tuxum" onclick="clickEgg()">
            <div id="coin-effect"></div>
        </div>
        <p id="message">Tuxumni bosib tanga ishlang!</p>
    </main>

    <!-- Navigatsiya -->
    <footer>
        <button onclick="navigateTo('home')">
            <div class="btn-icon home-icon"></div>
        </button>
        <button onclick="navigateTo('earn')">
            <div class="btn-icon earn-icon"></div>
        </button>
        <button onclick="navigateTo('upgrade')">
            <div class="btn-icon upgrade-icon"></div>
        </button>
        <button onclick="navigateTo('rating')">
            <div class="btn-icon rating-icon"></div>
        </button>
    </footer>

    <script src="script.js"></script>
</body>
</html>
