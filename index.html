<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Interface</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Home sahifasi -->
    <main id="home" class="page active">
        <div id="egg-container">
            <img id="egg" src="https://raw.githubusercontent.com/Qodirbek/QODEXTOKEN/main/egg.png" alt="Egg" onclick="clickEgg()">
        </div>
        <div class="energy-bar">
            <div class="energy-fill" id="energy-fill"></div>
            <span id="energy-text">1000</span>
        </div>
        <div id="coins">
            <img src="https://raw.githubusercontent.com/Qodirbek/QODEXTOKEN/main/Coin.png" alt="Coin">
            <span id="coin-count">0</span>
        </div>
    </main>

    <!-- Navigatsiya -->
    <footer>
        <button onclick="navigateTo('home')">
            <div class="btn-icon" style="background-image: url('https://raw.githubusercontent.com/Qodirbek/QODEXTOKEN/main/home.png');"></div>
        </button>
    </footer>

    <script src="script.js"></script>
</body>
</html>
