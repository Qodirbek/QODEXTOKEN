<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qodex Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Yuqori qism: Tangalar va Energiyalar -->
    <header>
        <div class="stats">
            <div class="stat">
                <img src="https://raw.githubusercontent.com/Qodirbek/QODEXTOKEN/main/Coin.png" alt="Tanga">
                <span id="coins">0</span>
            </div>
            <div class="stat">
                <img src="https://raw.githubusercontent.com/Qodirbek/QODEXTOKEN/main/energe.png" alt="Energiya">
                <span id="energy">1000</span>
            </div>
        </div>
    </header>

    <!-- Sahifa tarkibi -->
    <main id="game-container">
        <!-- Tuxum bosish sahifasi -->
        <section id="home">
            <img id="egg" class="egg" src="https://raw.githubusercontent.com/Qodirbek/QODEXTOKEN/main/egg.png" alt="Tuxum" onclick="clickEgg()">
            <p id="message">Tuxumni bosib tanga ishlang!</p>
        </section>

        <!-- Reyting -->
        <section id="rating">
            <h2>Reyting</h2>
            <ol id="leaderboard">
                <li id="leaderboard-entry">
                    <img id="user-image" src="https://telegram.org/img/t_logo.png" alt="Foydalanuvchi rasmi" class="user-image">
                    <span id="user-name">Ism...</span>, Tanga: <span id="user-coins">0</span>
                </li>
            </ol>
        </section>
    </main>

    <!-- Navigatsiya -->
    <footer>
        <button onclick="showPage('home')">
            <img src="https://raw.githubusercontent.com/Qodirbek/QODEXTOKEN/main/home.png" alt="Home"> Home
        </button>
        <button onclick="showPage('rating')">
            <img src="https://raw.githubusercontent.com/Qodirbek/QODEXTOKEN/main/rating.png" alt="Reyting"> Reyting
        </button>
    </footer>

    <script src="script.js"></script>
</body>
</html>
