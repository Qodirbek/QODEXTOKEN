<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qodex Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Yuqori qism: Tanga va Energiya -->
    <header>
        <div class="stats">
            <div class="stat">
                <img src="https://raw.githubusercontent.com/Qodirbek/QODEXTOKEN/main/Coin.png" alt="Tanga">
                <span id="coins">0</span>
            </div>
            <div class="stat">
                <img src="https://raw.githubusercontent.com/Qodirbek/QODEXTOKEN/main/energe.png" alt="Energiya">
                <span id="energy">1000</span>
            </div>
        </div>
    </header>

    <!-- Sahifa tarkibi -->
    <main id="game-container">
        <!-- Tuxum bosish sahifasi -->
        <section id="home" class="page">
            <img id="egg" class="egg" src="https://raw.githubusercontent.com/Qodirbek/QODEXTOKEN/main/egg.png" alt="Tuxum" onclick="clickEgg()">
        </section>

        <!-- Tangalar ishlash sahifasi -->
        <section id="earn" class="page hidden">
            <h2>Tangalar Ishlash</h2>
            <p>Tuxumni bosib tanga ishlang!</p>
        </section>

        <!-- Yangilash sahifasi -->
        <section id="upgrade" class="page hidden">
            <h2>Yangilash</h2>
            <p>Energiya yoki tangalarni yangilang.</p>
        </section>
    </main>

    <!-- Navigatsiya -->
    <footer>
        <button onclick="showPage('earn')">
            <img src="https://raw.githubusercontent.com/Qodirbek/QODEXTOKEN/main/home.png" alt="Earn">
        </button>
        <button onclick="showPage('home')">
            <img src="https://raw.githubusercontent.com/Qodirbek/QODEXTOKEN/main/home.png" alt="Home">
        </button>
        <button onclick="showPage('upgrade')">
            <img src="https://raw.githubusercontent.com/Qodirbek/QODEXTOKEN/main/egg.png" alt="Upgrade">
        </button>
    </footer>

    <script src="script.js"></script>
</body>
</html>
