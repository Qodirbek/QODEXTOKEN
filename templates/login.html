<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            margin-top: 100px;
        }
        button {
            background-color: #0088cc;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
        }
        button:hover {
            background-color: #006699;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Welcome to Qodex</h2>
        <p>Click the button below to log in with Telegram</p>
        <script async src="https://telegram.org/js/telegram-widget.js?22"
                data-telegram-login="Qodexcoin_bot"  <!-- Telegram bot username kiriting -->
                data-size="large"
                data-auth-url="/login"
                data-request-access="write"></script>
    </div>

</body>
</html>
